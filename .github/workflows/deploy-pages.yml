name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    # 06:00 KST
    - cron: "0 21 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Pages base path
        id: base
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          repo="${GITHUB_REPOSITORY#*/}"
          if [[ "${repo,,}" == "${owner}.github.io" ]]; then
            echo "base_url=/" >> "$GITHUB_OUTPUT"
          else
            echo "base_url=/${repo}/" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Install crawler dependencies
        working-directory: idec_crawler
        run: uv sync --locked

      - name: Generate lecture data
        working-directory: idec_crawler
        run: uv run python main.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: idec_tracker/package-lock.json

      - name: Install frontend dependencies
        working-directory: idec_tracker
        run: npm ci

      - name: Build static site
        working-directory: idec_tracker
        env:
          BASE_URL: ${{ steps.base.outputs.base_url }}
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: idec_tracker/build/client

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
